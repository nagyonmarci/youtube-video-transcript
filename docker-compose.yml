services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      POSTGRES_DB: directus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8055:8055"
    environment:
      SECRET: ${DIRECTUS_SECRET:-change-me-in-production}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-admin}
      ADMIN_TOKEN: ${DIRECTUS_ADMIN_TOKEN:-admin-token-change-me}
      PUBLIC_URL: ${PUBLIC_DIRECTUS_URL:-http://localhost:8055}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      WEBSOCKETS_ENABLED: "false"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions

  fetcher:
    build: ./fetcher
    restart: unless-stopped
    depends_on:
      - directus
    ports:
      - "8000:8000"
    environment:
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_ADMIN_TOKEN:-admin-token-change-me}
      REFRESH_CRON: ${REFRESH_CRON:-0 2 * * *}

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - directus
      - fetcher
    ports:
      - "4321:4321"
    environment:
      PUBLIC_DIRECTUS_URL: ${PUBLIC_DIRECTUS_URL:-http://localhost:8055}
      PUBLIC_DIRECTUS_TOKEN: ${DIRECTUS_ADMIN_TOKEN:-admin-token-change-me}
      PUBLIC_FETCHER_URL: ${PUBLIC_FETCHER_URL:-http://localhost:8000}

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
