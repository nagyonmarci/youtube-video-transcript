services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - app-network
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: directus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus"]
      interval: 10s
      timeout: 5s
      retries: 5

  fetcher:
    build: ./fetcher
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    environment:
      APP_API_TOKEN: ${APP_API_TOKEN:?APP_API_TOKEN must be set}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://yt.test,http://localhost:4321}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      FETCHER_ROLE: api
      FETCH_WORKER_CONCURRENCY: ${FETCH_WORKER_CONCURRENCY:-1}
      AI_WORKER_CONCURRENCY: ${AI_WORKER_CONCURRENCY:-1}
      REFRESH_CRON: ${REFRESH_CRON:-0 7 * * *}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Europe/Budapest}

  fetch-worker:
    build: ./fetcher
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["python", "worker.py"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    environment:
      APP_API_TOKEN: ${APP_API_TOKEN:?APP_API_TOKEN must be set}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://yt.test,http://localhost:4321}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      FETCHER_ROLE: worker
      WORKER_ID: fetch-worker
      WORKER_QUEUES: fetch
      FETCH_WORKER_CONCURRENCY: ${FETCH_WORKER_CONCURRENCY:-1}
      AI_WORKER_CONCURRENCY: 0
      STALE_JOB_MINUTES: ${STALE_JOB_MINUTES:-30}

  ai-worker:
    build: ./fetcher
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: ["python", "worker.py"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    environment:
      APP_API_TOKEN: ${APP_API_TOKEN:?APP_API_TOKEN must be set}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://yt.test,http://localhost:4321}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      FETCHER_ROLE: worker
      WORKER_ID: ai-worker
      WORKER_QUEUES: quick,ai
      FETCH_WORKER_CONCURRENCY: 0
      QUICK_WORKER_CONCURRENCY: ${QUICK_WORKER_CONCURRENCY:-3}
      AI_WORKER_CONCURRENCY: ${AI_WORKER_CONCURRENCY:-1}
      STALE_JOB_MINUTES: ${STALE_JOB_MINUTES:-30}

  whisper:
    build: ./whisper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    environment:
      APP_API_TOKEN: ${APP_API_TOKEN:?APP_API_TOKEN must be set}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://yt.test,http://localhost:4321}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      WHISPER_MODEL_PATH: /app/models/ggml-large-v3.bin
      WHISPER_THREADS: ${WHISPER_THREADS:-4}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-auto}
      BATCH_CRON: ${WHISPER_BATCH_CRON:-0 3 * * *}
      BATCH_LIMIT: ${WHISPER_BATCH_LIMIT:-50}
    volumes:
      - whisper_models:/app/models

  frontend:
    build: ./frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      - fetcher
    networks:
      - app-network
    environment:
      FETCHER_HOST: fetcher
      WHISPER_HOST: whisper
      APP_API_TOKEN: ${APP_API_TOKEN:?APP_API_TOKEN must be set}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - app-network
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_API_TOKEN: ${APP_API_TOKEN:?APP_API_TOKEN must be set}
      APP_BASIC_AUTH_USER: ${APP_BASIC_AUTH_USER:?APP_BASIC_AUTH_USER must be set}
      APP_BASIC_AUTH_HASH: ${APP_BASIC_AUTH_HASH:?APP_BASIC_AUTH_HASH must be set}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config

networks:
  app-network:
  web:
    external: true

volumes:
  postgres_data:
  whisper_models:
  caddy_data:
  caddy_config:
