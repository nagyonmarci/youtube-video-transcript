services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - app-network
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      POSTGRES_DB: directus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    environment:
      SECRET: ${DIRECTUS_SECRET:-change-me-in-production}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-admin}
      ADMIN_TOKEN: ${DIRECTUS_ADMIN_TOKEN:-admin-token-change-me}
      PUBLIC_URL: http://directus:8055
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      WEBSOCKETS_ENABLED: "false"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions

  fetcher:
    build: ./fetcher
    restart: unless-stopped
    depends_on:
      - directus
    networks:
      - app-network
    environment:
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_ADMIN_TOKEN:-admin-token-change-me}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      FETCHER_ROLE: api
      FETCH_WORKER_CONCURRENCY: 0
      AI_WORKER_CONCURRENCY: 0
      REFRESH_CRON: ${REFRESH_CRON:-0 7 * * *}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Europe/Budapest}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-gemma4:31b-mlx-bf16}
      AI_NOTES_AUTO: ${AI_NOTES_AUTO:-true}
      AI_NOTES_BATCH_LIMIT: ${AI_NOTES_BATCH_LIMIT:-10}
      AI_NOTES_MAX_BATCH_LIMIT: ${AI_NOTES_MAX_BATCH_LIMIT:-20000}

  fetch-worker:
    build: ./fetcher
    restart: unless-stopped
    command: ["python", "worker.py"]
    depends_on:
      - directus
    networks:
      - app-network
    environment:
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_ADMIN_TOKEN:-admin-token-change-me}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      FETCHER_ROLE: worker
      WORKER_ID: fetch-worker
      WORKER_QUEUES: fetch
      FETCH_WORKER_CONCURRENCY: ${FETCH_WORKER_CONCURRENCY:-1}
      AI_WORKER_CONCURRENCY: 0
      STALE_JOB_MINUTES: ${STALE_JOB_MINUTES:-30}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-gemma4:31b-mlx-bf16}
      AI_NOTES_AUTO: ${AI_NOTES_AUTO:-true}
      AI_NOTES_BATCH_LIMIT: ${AI_NOTES_BATCH_LIMIT:-10}
      AI_NOTES_MAX_BATCH_LIMIT: ${AI_NOTES_MAX_BATCH_LIMIT:-20000}

  ai-worker:
    build: ./fetcher
    restart: unless-stopped
    command: ["python", "worker.py"]
    depends_on:
      - directus
    networks:
      - app-network
    environment:
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_ADMIN_TOKEN:-admin-token-change-me}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      FETCHER_ROLE: worker
      WORKER_ID: ai-worker
      WORKER_QUEUES: ai
      FETCH_WORKER_CONCURRENCY: 0
      AI_WORKER_CONCURRENCY: ${AI_WORKER_CONCURRENCY:-1}
      STALE_JOB_MINUTES: ${STALE_JOB_MINUTES:-30}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-gemma4:31b-mlx-bf16}
      AI_NOTES_AUTO: ${AI_NOTES_AUTO:-true}
      AI_NOTES_BATCH_LIMIT: ${AI_NOTES_BATCH_LIMIT:-10}
      AI_NOTES_MAX_BATCH_LIMIT: ${AI_NOTES_MAX_BATCH_LIMIT:-20000}

  whisper:
    build: ./whisper
    restart: unless-stopped
    depends_on:
      - directus
    networks:
      - app-network
    environment:
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_TOKEN: ${DIRECTUS_ADMIN_TOKEN:-admin-token-change-me}
      WHISPER_MODEL_PATH: /app/models/ggml-large-v3.bin
      WHISPER_THREADS: ${WHISPER_THREADS:-4}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-auto}
      BATCH_CRON: ${WHISPER_BATCH_CRON:-0 3 * * *}
      BATCH_LIMIT: ${WHISPER_BATCH_LIMIT:-50}
    volumes:
      - whisper_models:/app/models

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - directus
      - fetcher
    networks:
      - app-network
    environment:
      DIRECTUS_HOST: directus
      FETCHER_HOST: fetcher
      WHISPER_HOST: whisper

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - app-network
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config

networks:
  app-network:
  web:
    external: true

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
  whisper_models:
  caddy_data:
  caddy_config:
