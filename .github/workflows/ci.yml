name: CI / DevSecOps

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  security-events: write

# ── Shared CI credentials (no real secrets) ───────────────────────────────
env:
  POSTGRES_PASSWORD: ci
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: directus
  POSTGRES_USER: directus
  DIRECTUS_SECRET: ci-directus-secret
  DIRECTUS_ADMIN_EMAIL: admin@example.com
  DIRECTUS_ADMIN_PASSWORD: ci-password
  DIRECTUS_ADMIN_TOKEN: ci-directus-token
  APP_API_TOKEN: ci-api-token
  APP_CORS_ORIGINS: http://localhost:4321
  APP_BASIC_AUTH_USER: ci
  APP_BASIC_AUTH_HASH: "ci-placeholder"

jobs:

  # ── 1. Frontend: install → audit → build ──────────────────────────────
  frontend:
    name: "Frontend · build & audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit production dependencies
        working-directory: frontend
        run: npm audit --omit=dev

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── 2. Python: syntax check + pip-audit ───────────────────────────────
  python:
    name: "Python · syntax & pip-audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            fetcher/requirements.txt
            whisper/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Syntax check – fetcher
        run: |
          python -m py_compile \
            fetcher/main.py \
            fetcher/directus_client.py \
            fetcher/youtube_fetcher.py \
            fetcher/ai_notes.py \
            fetcher/worker.py

      - name: Syntax check – whisper
        run: python -m py_compile whisper/main.py whisper/transcriber.py whisper/directus_client.py

      - name: pip-audit – fetcher
        run: pip-audit -r fetcher/requirements.txt

      - name: pip-audit – whisper
        run: pip-audit -r whisper/requirements.txt

  # ── 3. Docker: validate config + build all images ─────────────────────
  docker-build:
    name: "Docker · compose config & build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Build all images
        run: docker compose build

      - name: Export images for scanning
        run: |
          docker save youtube-video-transcript-fetcher:latest  | gzip > /tmp/fetcher.tar.gz
          docker save youtube-video-transcript-frontend:latest | gzip > /tmp/frontend.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar.gz
          retention-days: 1

  # ── 4. Trivy: filesystem + secret scan ────────────────────────────────
  trivy-fs:
    name: "Trivy · filesystem & secrets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan filesystem for CVEs and leaked secrets
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-fs.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ── 5. Trivy: container image scan (needs built images) ───────────────
  trivy-images:
    name: "Trivy · container images"
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load images into Docker
        run: for f in /tmp/*.tar.gz; do docker load < "$f"; done

      - name: Scan fetcher image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: image
          image-ref: youtube-video-transcript-fetcher:latest
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-fetcher.sarif

      - name: Upload fetcher SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fetcher.sarif
          category: trivy-fetcher

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: image
          image-ref: youtube-video-transcript-frontend:latest
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-frontend.sarif

      - name: Upload frontend SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
