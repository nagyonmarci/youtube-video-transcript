name: Security and Build Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      DIRECTUS_SECRET: ci-directus-secret
      DIRECTUS_ADMIN_PASSWORD: ci-directus-admin-password
      DIRECTUS_ADMIN_TOKEN: ci-directus-admin-token
      APP_API_TOKEN: ci-app-api-token
      APP_BASIC_AUTH_USER: admin
      APP_BASIC_AUTH_HASH: "ci-placeholder"
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      SECRET_KEY: ci-jwt-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm audit --omit=dev

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python modules
        run: python -m py_compile fetcher/main.py fetcher/directus_client.py fetcher/youtube_fetcher.py fetcher/ai_notes.py whisper/main.py app/main.py

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Scan filesystem
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
