name: Release

on:
  workflow_run:
    workflows: ["CI / DevSecOps"]
    branches: [master]
    types: [completed]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-master
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: "Tag, publish images, create release"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          prefix="v$(date -u +'%Y.%m.%d')"
          latest="$(
            git ls-remote --tags origin "refs/tags/${prefix}.*" \
              | awk -v prefix="${prefix}" '$2 ~ "^refs/tags/" prefix "\\.[0-9]+$" {
                  sub("^refs/tags/" prefix "\\.", "", $2)
                  print $2
                }' \
              | sort -n \
              | tail -1
          )"

          if [[ -z "${latest}" ]]; then
            next=1
          else
            next=$((latest + 1))
          fi

          tag="${prefix}.${next}"
          repo_lc="${GITHUB_REPOSITORY,,}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=${tag}" >> "$GITHUB_ENV"
          echo "IMAGE_PREFIX=${REGISTRY}/${repo_lc}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish fetcher image
        uses: docker/build-push-action@v6
        with:
          context: ./fetcher
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.repo_lc }}/fetcher:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.repo_lc }}/fetcher:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.repo_lc }}/frontend:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.repo_lc }}/frontend:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}

      - name: Build and publish whisper image
        uses: docker/build-push-action@v6
        with:
          context: ./whisper
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.repo_lc }}/whisper:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.repo_lc }}/whisper:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}

      - name: Create git tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${{ github.event.workflow_run.head_sha }}" \
            -m "Release ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<NOTES
          Published Docker images:

          - ${IMAGE_PREFIX}/fetcher:${RELEASE_TAG}
          - ${IMAGE_PREFIX}/frontend:${RELEASE_TAG}
          - ${IMAGE_PREFIX}/whisper:${RELEASE_TAG}

          Deploy with:

          ```bash
          RELEASE_VERSION=${RELEASE_TAG} docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          RELEASE_VERSION=${RELEASE_TAG} docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          ```
          NOTES

          gh release create "${RELEASE_TAG}" \
            --target "${{ github.event.workflow_run.head_sha }}" \
            --title "${RELEASE_TAG}" \
            --notes-file release-notes.md
