name: Release

on:
  workflow_run:
    workflows: ["CI / DevSecOps"]
    branches: [master]
    types: [completed]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-master
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: "Tag, publish images, create release"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Bump version and push tag
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          release_branches: master

      - name: Set release env
        id: env_setup
        shell: bash
        run: |
          set -euo pipefail
          repo_lc="${GITHUB_REPOSITORY,,}"
          echo "repo_lc=${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=${{ steps.version.outputs.new_tag }}" >> "$GITHUB_ENV"
          echo "IMAGE_PREFIX=${REGISTRY}/${repo_lc}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish fetcher image
        uses: docker/build-push-action@v6
        with:
          context: ./fetcher
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.env_setup.outputs.repo_lc }}/fetcher:${{ steps.version.outputs.new_tag }}
            ${{ env.REGISTRY }}/${{ steps.env_setup.outputs.repo_lc }}/fetcher:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.new_tag }}

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.env_setup.outputs.repo_lc }}/frontend:${{ steps.version.outputs.new_tag }}
            ${{ env.REGISTRY }}/${{ steps.env_setup.outputs.repo_lc }}/frontend:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.new_tag }}

      - name: Build and publish whisper image
        uses: docker/build-push-action@v6
        with:
          context: ./whisper
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.env_setup.outputs.repo_lc }}/whisper:${{ steps.version.outputs.new_tag }}
            ${{ env.REGISTRY }}/${{ steps.env_setup.outputs.repo_lc }}/whisper:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.new_tag }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<NOTES
          Published Docker images:

          - ${IMAGE_PREFIX}/fetcher:${RELEASE_TAG}
          - ${IMAGE_PREFIX}/frontend:${RELEASE_TAG}
          - ${IMAGE_PREFIX}/whisper:${RELEASE_TAG}

          Deploy with:

          ```bash
          RELEASE_VERSION=${RELEASE_TAG} docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          RELEASE_VERSION=${RELEASE_TAG} docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          ```
          NOTES

          gh release create "${RELEASE_TAG}" \
            --target "${{ github.event.workflow_run.head_sha }}" \
            --title "${RELEASE_TAG}" \
            --notes-file release-notes.md
