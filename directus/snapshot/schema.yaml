version: 1
directus: 11.0.0

collections:
  - collection: channels
    meta:
      collection: channels
      icon: video_library
      note: YouTube channels being tracked
      display_template: "{{name}}"
      hidden: false
      singleton: false
      translations: null
      archive_field: null
      archive_app_filter: true
      archive_value: null
      unarchive_value: null
      sort_field: null
      accountability: all
      color: null
      item_duplication_fields: null
      sort: 1
      group: null
      collapse: open
      preview_url: null
      versioning: false
    schema:
      name: channels

  - collection: videos
    meta:
      collection: videos
      icon: ondemand_video
      note: YouTube videos with transcripts
      display_template: "{{title}}"
      hidden: false
      singleton: false
      translations: null
      archive_field: null
      archive_app_filter: true
      archive_value: null
      unarchive_value: null
      sort_field: null
      accountability: all
      color: null
      item_duplication_fields: null
      sort: 2
      group: null
      collapse: open
      preview_url: null
      versioning: false
    schema:
      name: videos

  - collection: app_settings
    meta:
      collection: app_settings
      icon: settings
      note: Application settings
      display_template: "{{key}}"
      hidden: false
      singleton: false
      translations: null
      archive_field: null
      archive_app_filter: true
      archive_value: null
      unarchive_value: null
      sort_field: null
      accountability: all
      color: null
      item_duplication_fields: null
      sort: 3
      group: null
      collapse: open
      preview_url: null
      versioning: false
    schema:
      name: app_settings

fields:
  # app_settings fields
  - collection: app_settings
    field: id
    type: uuid
    schema:
      name: id
      table: app_settings
      data_type: uuid
      default_value: null
      is_nullable: false
      is_primary_key: true
      has_auto_increment: false
    meta:
      collection: app_settings
      field: id
      special:
        - uuid
      interface: input
      readonly: true
      hidden: true

  - collection: app_settings
    field: key
    type: string
    schema:
      name: key
      table: app_settings
      data_type: character varying
      max_length: 100
      is_nullable: false
      is_unique: true
    meta:
      collection: app_settings
      field: key
      interface: input
      hidden: false
      width: half

  - collection: app_settings
    field: value
    type: text
    schema:
      name: value
      table: app_settings
      data_type: text
      is_nullable: true
    meta:
      collection: app_settings
      field: value
      interface: input-multiline
      display: raw
      hidden: false
      width: full

  # channels fields
  - collection: channels
    field: id
    type: uuid
    schema:
      name: id
      table: channels
      data_type: uuid
      default_value: null
      is_nullable: false
      is_primary_key: true
      has_auto_increment: false
    meta:
      collection: channels
      field: id
      special:
        - uuid
      interface: input
      readonly: true
      hidden: true

  - collection: channels
    field: name
    type: string
    schema:
      name: name
      table: channels
      data_type: character varying
      max_length: 255
      is_nullable: true
    meta:
      collection: channels
      field: name
      interface: input
      display: raw
      readonly: false
      hidden: false
      width: full
      required: false

  - collection: channels
    field: channel_url
    type: string
    schema:
      name: channel_url
      table: channels
      data_type: character varying
      max_length: 512
      is_nullable: true
    meta:
      collection: channels
      field: channel_url
      interface: input
      display: raw
      readonly: false
      hidden: false
      width: full

  - collection: channels
    field: channel_handle
    type: string
    schema:
      name: channel_handle
      table: channels
      data_type: character varying
      max_length: 255
      is_nullable: true
    meta:
      collection: channels
      field: channel_handle
      interface: input
      display: raw
      hidden: false
      width: half

  - collection: channels
    field: added_at
    type: timestamp
    schema:
      name: added_at
      table: channels
      data_type: timestamp with time zone
      is_nullable: true
      default_value: now()
    meta:
      collection: channels
      field: added_at
      special:
        - date-created
      interface: datetime
      display: datetime
      readonly: true
      hidden: false
      width: half

  - collection: channels
    field: status
    type: string
    schema:
      name: status
      table: channels
      data_type: character varying
      max_length: 50
      is_nullable: true
      default_value: pending
    meta:
      collection: channels
      field: status
      interface: select-dropdown
      display: labels
      options:
        choices:
          - text: Pending
            value: pending
          - text: Processing
            value: processing
          - text: Done
            value: done
          - text: Error
            value: error
      hidden: false
      width: half

  - collection: channels
    field: video_count
    type: integer
    schema:
      name: video_count
      table: channels
      data_type: integer
      is_nullable: true
      default_value: 0
    meta:
      collection: channels
      field: video_count
      interface: input
      display: raw
      readonly: true
      hidden: false
      width: half

  - collection: channels
    field: error_message
    type: text
    schema:
      name: error_message
      table: channels
      data_type: text
      is_nullable: true
    meta:
      collection: channels
      field: error_message
      interface: input-multiline
      display: raw
      readonly: true
      hidden: false
      width: full

  - collection: channels
    field: last_refreshed
