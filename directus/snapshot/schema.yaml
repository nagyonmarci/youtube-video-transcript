      table: channels
      data_type: timestamp with time zone
      is_nullable: true
    meta:
      collection: channels
      field: last_refreshed
      interface: datetime
      display: datetime
      readonly: true
      hidden: false
      width: half

  # videos fields
  - collection: videos
    field: id
