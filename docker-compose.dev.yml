# Local development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
networks:
  traefik_proxy:
    external: false  # create locally instead of requiring Traefik

services:
  directus:
    ports:
      - "8055:8055"

  fetcher:
    ports:
      - "8000:8000"

  whisper:
    ports:
      - "8001:8001"
