# Local development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
networks:
  traefik_proxy:
    external: false  # create locally instead of requiring Traefik

services:
  directus:
    ports:
      - "8055:8055"

  fetcher:
    ports:
      - "8000:8000"

  whisper:
    ports:
      - "8001:8001"

  frontend:
    ports:
      - "4321:4321"
    environment:
      DIRECTUS_HOST: directus
      FETCHER_HOST: fetcher
      WHISPER_HOST: whisper
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/astro.config.mjs:/app/astro.config.mjs
